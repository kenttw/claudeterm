<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ClaudeTerm</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #1e1e1e; overflow: hidden; display: flex; flex-direction: column; }

    /* ── Desktop 3-column layout ──────────────────────────────────────────── */
    #main-area {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: row;
      overflow: hidden;
    }

    /* Drag handle between panels */
    .drag-handle {
      width: 5px;
      flex-shrink: 0;
      background: #2a2a2a;
      cursor: col-resize;
      transition: background 0.15s;
      z-index: 10;
    }
    .drag-handle:hover, .drag-handle.dragging { background: #0e8; }

    /* File browser — desktop only */
    #file-browser {
      display: none;
      flex-direction: column;
      width: 200px;
      min-width: 120px;
      background: #1e1e1e;
      flex-shrink: 0;
      overflow: hidden;
    }
    #file-browser-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      font-size: 11px;
      color: #777;
      font-family: Menlo, Monaco, monospace;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
      overflow: hidden;
    }
    #fb-path {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }
    #fb-up {
      cursor: pointer;
      padding: 2px 5px;
      color: #888;
      font-size: 13px;
      flex-shrink: 0;
    }
    #fb-up:hover { color: #fff; }
    #fb-list {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #444 transparent;
    }
    .fb-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      font-size: 12px;
      font-family: Menlo, Monaco, monospace;
      color: #c8c8c8;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      user-select: none;
    }
    .fb-item:hover { background: #2a2d2e; }
    .fb-item.active { background: #37373d; color: #fff; }
    .fb-item .fb-icon { flex-shrink: 0; font-size: 13px; }

    /* Editor panel — desktop only, col 2 */
    #editor-panel {
      display: none;
      flex-direction: column;
      width: 380px;
      min-width: 160px;
      background: #1e1e1e;
      flex-shrink: 0;
      overflow: hidden;
    }
    #editor-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      font-size: 11px;
      color: #888;
      font-family: Menlo, Monaco, monospace;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }
    #editor-filename {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #d4d4d4;
    }
    #editor-save {
      padding: 2px 8px;
      background: #0e8;
      color: #000;
      border: none;
      border-radius: 4px;
      font-size: 11px;
      font-family: Menlo, Monaco, monospace;
      cursor: pointer;
      flex-shrink: 0;
    }
    #editor-save:hover { background: #0fa; }
    #editor-save.saved { background: #555; color: #888; cursor: default; }
    #editor-close {
      color: #666;
      cursor: pointer;
      font-size: 16px;
      flex-shrink: 0;
      line-height: 1;
      padding: 0 2px;
    }
    #editor-close:hover { color: #f66; }
    #editor-placeholder {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #444;
      font-family: Menlo, Monaco, monospace;
      font-size: 13px;
    }
    #editor-textarea {
      display: none;
      flex: 1;
      min-height: 0;
      width: 100%;
      background: #1e1e1e;
      color: #d4d4d4;
      border: none;
      outline: none;
      padding: 10px;
      font-size: 13px;
      font-family: Menlo, Monaco, "Courier New", monospace;
      line-height: 1.5;
      resize: none;
      tab-size: 2;
    }

    /* Terminal column — col 3, takes remaining space */
    #terminal-column {
      flex: 1;
      min-width: 200px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #terminal { flex: 1; min-height: 0; width: 100%; }

    /* Show file browser + editor on desktop */
    @media (min-width: 900px) {
      #file-browser { display: flex; }
      #editor-panel { display: flex; }
      .drag-handle { display: block; }
    }
    @media (max-width: 899px) {
      .drag-handle { display: none; }
    }

    /* Session bar */
    #session-bar {
      display: flex;
      align-items: center;
      background: #252526;
      border-bottom: 1px solid #444;
      overflow-x: auto;
      overflow-y: hidden;
      flex-shrink: 0;
      min-height: 36px;
      scrollbar-width: none;
      white-space: nowrap;
      flex-wrap: nowrap;
    }
    #session-bar::-webkit-scrollbar { display: none; }

    #session-tabs {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
    }

    .session-tab {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      color: #888;
      font-size: 12px;
      font-family: Menlo, Monaco, monospace;
      cursor: pointer;
      white-space: nowrap;
      border-right: 1px solid #333;
      user-select: none;
      -webkit-user-select: none;
    }
    .session-tab.active { color: #fff; background: #1e1e1e; border-bottom: 2px solid #0e8; }
    .session-tab.claude-type { border-bottom-color: #f90; }
    .session-tab .claude-icon { font-size: 11px; opacity: 0.8; }
    .session-tab .kill {
      color: #666;
      font-size: 14px;
      padding: 0 2px;
      line-height: 1;
    }
    .session-tab .kill:hover { color: #f66; }

    #btn-new-session {
      padding: 6px 12px;
      color: #888;
      font-size: 18px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      flex-shrink: 0;
    }
    #btn-new-session:hover { color: #fff; }

    /* Directory picker modal */
    #dir-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #dir-modal.show { display: flex; }
    #dir-picker {
      background: #252526;
      border: 1px solid #555;
      border-radius: 10px;
      width: 88vw;
      max-width: 400px;
      max-height: 70vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #dir-picker-header {
      padding: 12px 16px;
      font-size: 13px;
      color: #888;
      font-family: Menlo, Monaco, monospace;
      border-bottom: 1px solid #444;
      flex-shrink: 0;
    }
    #dir-list {
      overflow-y: auto;
      flex: 1;
    }
    .dir-item {
      padding: 12px 16px;
      font-family: Menlo, Monaco, monospace;
      font-size: 13px;
      color: #d4d4d4;
      cursor: pointer;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dir-item:active { background: #3a3a3a; }
    #dir-cancel {
      padding: 12px;
      text-align: center;
      color: #888;
      font-size: 13px;
      cursor: pointer;
      border-top: 1px solid #444;
      flex-shrink: 0;
    }
    #dir-cancel:active { background: #3a3a3a; }

    /* Kill confirm modal */
    #kill-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    #kill-modal.show { display: flex; }
    #kill-dialog {
      background: #252526;
      border: 1px solid #555;
      border-radius: 12px;
      width: 80vw;
      max-width: 320px;
      overflow: hidden;
    }
    #kill-dialog-title {
      padding: 16px;
      font-size: 14px;
      color: #d4d4d4;
      font-family: Menlo, Monaco, monospace;
      text-align: center;
      border-bottom: 1px solid #444;
    }
    #kill-dialog-name {
      color: #fff;
      font-weight: bold;
    }
    .kill-dialog-btns {
      display: flex;
    }
    .kill-dialog-btns button {
      flex: 1;
      padding: 14px;
      font-size: 14px;
      font-family: Menlo, Monaco, monospace;
      border: none;
      cursor: pointer;
      background: transparent;
    }
    #kill-cancel-btn {
      color: #888;
      border-right: 1px solid #444;
    }
    #kill-cancel-btn:active { background: #3a3a3a; }
    #kill-confirm-btn {
      color: #f66;
      font-weight: bold;
    }
    #kill-confirm-btn:active { background: #3a3a3a; }

    #rate-limit-banner {
      display: none;
      background: #2a1800;
      border-bottom: 1px solid #664400;
      color: #f90;
      font-family: Menlo, Monaco, monospace;
      font-size: 12px;
      padding: 5px 12px;
      text-align: center;
      flex-shrink: 0;
    }

    #no-session {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-family: Menlo, Monaco, monospace;
      font-size: 14px;
    }

    /* Toolbar */
    #toolbar {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 6px;
      padding: 6px 8px;
      background: #2d2d2d;
      border-top: 1px solid #444;
      flex-shrink: 0;
    }

    #toolbar button {
      background: #3a3a3a;
      color: #d4d4d4;
      border: 1px solid #555;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13px;
      font-family: Menlo, Monaco, monospace;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      min-width: 40px;
      min-height: 36px;
      line-height: 1.2;
      text-align: center;
    }
    #toolbar button:active { background: #555; border-color: #888; }

    .arrow-group {
      display: grid;
      grid-template-columns: 34px 34px 34px;
      grid-template-rows: 30px 30px;
      gap: 3px;
    }
    .arrow-group button {
      padding: 4px;
      min-width: unset;
      min-height: unset;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .arrow-up    { grid-column: 2; grid-row: 1; }
    .arrow-left  { grid-column: 1; grid-row: 2; }
    .arrow-down  { grid-column: 2; grid-row: 2; }
    .arrow-right { grid-column: 3; grid-row: 2; }
  </style>
</head>
<body>

  <!-- Kill confirm modal -->
  <div id="kill-modal">
    <div id="kill-dialog">
      <div id="kill-dialog-title">Close session <span id="kill-dialog-name"></span>?</div>
      <div class="kill-dialog-btns">
        <button id="kill-cancel-btn">Cancel</button>
        <button id="kill-confirm-btn">Close</button>
      </div>
    </div>
  </div>

  <!-- Directory picker modal -->
  <div id="dir-modal">
    <div id="dir-picker">
      <div id="dir-picker-header">📁 ~/git — Select directory</div>
      <div id="dir-list"></div>
      <div id="dir-cancel">Cancel</div>
    </div>
  </div>

  <!-- Session bar -->
  <div id="session-bar">
    <div id="session-tabs"></div>
    <div id="btn-new-session" title="New session">＋</div>
  </div>

  <!-- Main area: file list | drag | editor/preview | drag | terminal -->
  <div id="main-area">

    <!-- Col 1: file browser (desktop only) -->
    <div id="file-browser">
      <div id="file-browser-header">
        <span id="fb-up" title="Up">↑</span>
        <span id="fb-path">~/git</span>
      </div>
      <div id="fb-list"></div>
    </div>

    <div class="drag-handle" id="drag-1"></div>

    <!-- Col 2: file preview/editor (desktop only) -->
    <div id="editor-panel">
      <div id="editor-header">
        <span id="editor-filename">No file open</span>
        <button id="editor-save" class="saved" style="display:none">Saved</button>
        <span id="editor-close" style="display:none">×</span>
      </div>
      <div id="editor-placeholder">← click a file to preview</div>
      <textarea id="editor-textarea" spellcheck="false"></textarea>
    </div>

    <div class="drag-handle" id="drag-2"></div>

    <!-- Col 3: terminal -->
    <div id="terminal-column">
      <!-- Rate limit notification banner -->
      <div id="rate-limit-banner"><span id="rate-limit-msg"></span></div>
      <div id="no-session">No session — tap ＋ to start</div>
      <div id="terminal" style="display:none"></div>
    </div>

  </div>

  <!-- Toolbar -->
  <div id="toolbar">
    <button id="btn-tab">Tab</button>
    <button id="btn-enter">Enter</button>
    <button id="btn-ls">ls</button>
    <button id="btn-cd">cd</button>
    <button id="btn-clear">clear</button>
    <button id="btn-bksp">⌫</button>
    <button id="btn-ctrlc">^C</button>
    <button id="btn-1">1</button>
    <button id="btn-2">2</button>
    <button id="btn-3">3</button>
    <button id="btn-claude"><small style="font-size:10px;opacity:0.7">claude</small></button>
    <button id="btn-continue">cont<br><small style="font-size:10px;opacity:0.7">inue</small></button>
    <button id="btn-next">do next<br><small style="font-size:10px;opacity:0.7">item</small></button>
    <button id="btn-folder" title="Switch folder">📂<br><small style="font-size:10px;opacity:0.7">folder</small></button>
    <div class="arrow-group">
      <button class="arrow-up"    id="btn-up">▲</button>
      <button class="arrow-left"  id="btn-left">◀</button>
      <button class="arrow-down"  id="btn-down">▼</button>
      <button class="arrow-right" id="btn-right">▶</button>
    </div>
  </div>

  <script>
    const term = new Terminal({
      cursorBlink: true,
      fontFamily: 'Menlo, Monaco, "Courier New", monospace',
      fontSize: 14,
      scrollback: 50000,
      theme: { background: '#1e1e1e', foreground: '#d4d4d4', cursor: '#ffffff' },
    });
    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));

    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    let ws;
    fetch('/api/token')
      .then(r => r.json())
      .then(({ token }) => {
        ws = new WebSocket(`${protocol}//${location.host}?token=${token}`);
        initWs();
      })
      .catch(() => {
        document.getElementById('no-session').textContent = 'Auth failed — please reload.';
      });

    let currentSessionId = null;
    let allSessions = [];
    let rateLimitTimerId = null;

    function showRateLimit(retryAfter) {
      clearTimeout(rateLimitTimerId);
      const banner = document.getElementById('rate-limit-banner');
      const msg = document.getElementById('rate-limit-msg');
      banner.style.display = '';
      if (retryAfter > 0) {
        let remaining = retryAfter;
        const tick = () => {
          msg.textContent = `\u26a0 Rate limited — retrying in ${remaining}s`;
          if (remaining <= 0) { hideRateLimit(); return; }
          remaining--;
          rateLimitTimerId = setTimeout(tick, 1000);
        };
        tick();
      } else {
        msg.textContent = '\u26a0 Rate limited — waiting...';
        rateLimitTimerId = setTimeout(hideRateLimit, 65000);
      }
    }

    function hideRateLimit() {
      clearTimeout(rateLimitTimerId);
      document.getElementById('rate-limit-banner').style.display = 'none';
    }
    let claudeCmd = 'claude'; // overwritten by /api/config

    fetch('/api/config')
      .then(r => r.json())
      .then(cfg => {
        claudeCmd = cfg.claudeCommand || 'claude';
        const btn = document.getElementById('btn-claude');
        const parts = claudeCmd.split(' ');
        btn.innerHTML = parts.slice(0, -1).join(' ') + (parts.length > 1 ? '<br>' : '') +
          `<small style="font-size:10px;opacity:0.7">${parts[parts.length - 1]}</small>`;
      })
      .catch(() => {});

    function send(data) {
      if (ws.readyState === WebSocket.OPEN)
        ws.send(JSON.stringify({ type: 'input', data }));
    }

    function showTerminal(show) {
      document.getElementById('terminal').style.display = show ? '' : 'none';
      document.getElementById('no-session').style.display = show ? 'none' : '';
      if (show) setTimeout(() => { fitAddon.fit(); term.scrollToBottom(); }, 50);
    }

    // ── URL routing ────────────────────────────────────────────────────────────
    function parsePath() {
      const parts = location.pathname.replace(/^\/+|\/+$/g, '').split('/').filter(Boolean);
      return { dir: parts[0] || null, sessionName: parts[1] ? decodeURIComponent(parts[1]) : null };
    }

    function dirFromPath() {
      return parsePath().dir;
    }

    function setUrl(dir, sessionName) {
      let url = dir ? '/' + dir : '/';
      if (dir && sessionName) url += '/' + encodeURIComponent(sessionName);
      if (location.pathname !== url) history.pushState({}, '', url);
      document.title = dir ? 'ClaudeTerm-' + dir : 'ClaudeTerm';
    }

    // Called once session list is received — auto-attach or create based on URL
    function autoAttachFromUrl() {
      const { dir, sessionName } = parsePath();
      if (!dir) return;
      // Match by dir + session name if present, otherwise first in dir
      const inDir = allSessions.filter(s => s.dir === dir);
      const match = sessionName
        ? (inDir.find(s => s.name === sessionName) || inDir[0])
        : inDir[0];
      if (match) {
        if (match.id !== currentSessionId) attachSession(match.id);
      } else {
        ws.send(JSON.stringify({ type: 'session.create', name: 'session_1', cwd: '__BASE__/' + dir }));
      }
    }

    // Handle browser back/forward
    window.addEventListener('popstate', autoAttachFromUrl);

    function renderTabs() {
      const container = document.getElementById('session-tabs');
      container.innerHTML = '';
      const currentDir = dirFromPath();
      const visible = currentDir
        ? allSessions.filter(s => s.dir === currentDir)
        : allSessions;
      visible.forEach(s => {
        const isActive = s.id === currentSessionId;
        const isClaude = s.type === 'claude';
        const tab = document.createElement('div');
        tab.className = 'session-tab' + (isActive ? ' active' : '') + (isClaude ? ' claude-type' : '');

        const label = document.createElement('span');
        label.textContent = s.name;
        if (isClaude) {
          const icon = document.createElement('span');
          icon.className = 'claude-icon';
          icon.textContent = ' ⚡';
          label.appendChild(icon);
        }
        label.addEventListener('click', () => attachSession(s.id));

        const kill = document.createElement('span');
        kill.className = 'kill';
        kill.textContent = '×';
        kill.addEventListener('click', (e) => {
          e.stopPropagation();
          showKillConfirm(s.id, s.name);
        });

        tab.appendChild(label);
        tab.appendChild(kill);
        container.appendChild(tab);
      });
    }

    function attachSession(id) {
      term.clear();
      ws.send(JSON.stringify({ type: 'session.attach', id }));
      // URL is updated when server responds with session.attached
    }

    function initWs() {
      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);

        if (msg.type === 'output') {
          term.write(msg.data, () => term.scrollToBottom());
        }

        if (msg.type === 'session.list') {
          const firstLoad = allSessions.length === 0;
          allSessions = msg.sessions;
          renderTabs();
          const current = allSessions.find(s => s.id === currentSessionId);
          if (currentSessionId && !current) {
            currentSessionId = null;
            showTerminal(false);
            setUrl(dirFromPath());
          } else if (current) {
            setUrl(current.dir, current.name); // keep URL in sync after renames
          }
          if (firstLoad) {
            const dir = dirFromPath();
            if (dir) {
              autoAttachFromUrl();
            } else {
              openDirPicker();
            }
          }
        }

        if (msg.type === 'rate.limited') {
          showRateLimit(msg.retryAfter);
        }

        if (msg.type === 'session.attached') {
          currentSessionId = msg.id;
          hideRateLimit();
          showTerminal(true);
          renderTabs();
          setUrl(msg.dir, msg.name);
          if (!fbCurrentPath) maybeFbLoad(msg.dir);
        }
      };

      ws.onclose = () => {
        if (currentSessionId) term.write('\r\n\x1b[31mDisconnected.\x1b[0m\r\n');
      };
    }

    // Kill confirm modal
    const killModal = document.getElementById('kill-modal');
    let pendingKillId = null;

    function showKillConfirm(id, name) {
      pendingKillId = id;
      document.getElementById('kill-dialog-name').textContent = '"' + name + '"';
      killModal.classList.add('show');
    }

    document.getElementById('kill-cancel-btn').addEventListener('click', () => {
      killModal.classList.remove('show');
      pendingKillId = null;
    });
    document.getElementById('kill-confirm-btn').addEventListener('click', () => {
      if (pendingKillId !== null) {
        ws.send(JSON.stringify({ type: 'session.kill', id: pendingKillId }));
      }
      killModal.classList.remove('show');
      pendingKillId = null;
    });
    killModal.addEventListener('click', (e) => {
      if (e.target === killModal) {
        killModal.classList.remove('show');
        pendingKillId = null;
      }
    });

    const dirModal = document.getElementById('dir-modal');
    const dirList  = document.getElementById('dir-list');

    function openDirPicker() {
      dirList.innerHTML = '<div class="dir-item" style="color:#666">Loading...</div>';
      dirModal.classList.add('show');
      fetch('/api/dirs')
        .then(r => r.json())
        .then(({ base, dirs }) => {
          dirList.innerHTML = '';
          dirs.forEach(d => {
            const item = document.createElement('div');
            item.className = 'dir-item';
            item.innerHTML = `<span>📂</span><span>${d}</span>`;
            item.addEventListener('click', () => {
              dirModal.classList.remove('show');
              // Navigate to /<dir> — the URL change triggers auto-attach or create
              history.pushState({}, '', '/' + d);
              autoAttachFromUrl();
            });
            dirList.appendChild(item);
          });
        })
        .catch(() => {
          dirList.innerHTML = '<div class="dir-item" style="color:#f66">Failed to load</div>';
        });
    }

    document.getElementById('btn-new-session').addEventListener('click', () => {
      const dir = dirFromPath();
      if (dir) {
        // Already in a subdir — create session directly without dir picker
        const existingCount = allSessions.filter(s => s.dir === dir).length;
        const name = 'session_' + (existingCount + 1);
        ws.send(JSON.stringify({ type: 'session.create', name, cwd: '__BASE__/' + dir }));
      } else {
        openDirPicker();
      }
    });
    document.getElementById('dir-cancel').addEventListener('click', () => {
      dirModal.classList.remove('show');
    });

    // Track typed input to detect claude commands
    let inputBuffer = '';
    function renameSession(name) {
      if (currentSessionId) {
        ws.send(JSON.stringify({ type: 'session.rename', id: currentSessionId, name }));
      }
    }

    // xterm.js internally responds to queries (OSC color queries, cursor position reports)
    // via onData — we must NOT forward these back to the PTY or they get echoed as garbage.
    function isTerminalResponse(data) {
      return /^\x1b\]/.test(data) ||        // OSC responses (e.g. background color)
             /^\x1b\[\d+;\d+R$/.test(data); // Cursor Position Report (CPR)
    }

    term.onData((data) => {
      if (isTerminalResponse(data)) return;
      send(data);
      if (data === '\r') {
        const line = inputBuffer.trim();
        const escapedCmd = claudeCmd.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        if (new RegExp('^' + escapedCmd + '\\s*$').test(line)) {
          renameSession('Claude');
        }
        inputBuffer = '';
      } else if (data === '\x7f') {
        inputBuffer = inputBuffer.slice(0, -1); // backspace
      } else if (data.length === 1 && data >= ' ') {
        inputBuffer += data;
      }
    });

    term.onTitleChange((title) => {
      if (currentSessionId && title) renameSession(title);
    });
    term.onResize(({ cols, rows }) => {
      if (ws.readyState === WebSocket.OPEN)
        ws.send(JSON.stringify({ type: 'resize', cols, rows }));
    });

    // Toolbar
    document.getElementById('btn-tab').addEventListener('click',    () => send('\t'));
    document.getElementById('btn-enter').addEventListener('click',  () => send('\r'));
    document.getElementById('btn-ls').addEventListener('click',     () => send('ls\r'));
    document.getElementById('btn-cd').addEventListener('click',     () => send('cd '));
    document.getElementById('btn-clear').addEventListener('click',  () => send('clear\r'));
    document.getElementById('btn-bksp').addEventListener('click',   () => send('\x7f'));
    document.getElementById('btn-ctrlc').addEventListener('click',  () => send('\x03'));
    document.getElementById('btn-1').addEventListener('click',      () => send('1'));
    document.getElementById('btn-2').addEventListener('click',      () => send('2'));
    document.getElementById('btn-3').addEventListener('click',      () => send('3'));
    document.getElementById('btn-claude').addEventListener('click', () => {
      send(claudeCmd + '\r');
      renameSession('Claude');
      if (currentSessionId) {
        ws.send(JSON.stringify({ type: 'session.rename', id: currentSessionId, name: 'Claude' }));
      }
    });
    document.getElementById('btn-continue').addEventListener('click', () => send('continue\r'));
    document.getElementById('btn-next').addEventListener('click',     () => send('do next item\r'));
    document.getElementById('btn-folder').addEventListener('click',   () => openDirPicker());
    document.getElementById('btn-up').addEventListener('click',     () => send('\x1b[A'));
    document.getElementById('btn-down').addEventListener('click',   () => send('\x1b[B'));
    document.getElementById('btn-right').addEventListener('click',  () => send('\x1b[C'));
    document.getElementById('btn-left').addEventListener('click',   () => send('\x1b[D'));

    function fitAndScroll() { fitAddon.fit(); term.scrollToBottom(); }
    window.addEventListener('resize', () => { if (currentSessionId) fitAndScroll(); });
    window.visualViewport?.addEventListener('resize', () => { if (currentSessionId) fitAndScroll(); });

    // ── File browser ─────────────────────────────────────────────────────────
    let fbCurrentPath = null; // null = not yet loaded
    let fbActiveFile  = null;
    let editorDirty   = false;

    function fbLoad(dir) {
      fetch('/api/files?path=' + encodeURIComponent(dir))
        .then(r => r.json())
        .then(({ path: p, items }) => {
          fbCurrentPath = p;
          document.getElementById('fb-path').textContent =
            p.replace(location.origin, '').replace(/^.*\/git\//, '~/git/');
          const list = document.getElementById('fb-list');
          list.innerHTML = '';
          items.forEach(item => {
            const el = document.createElement('div');
            el.className = 'fb-item' + (fbActiveFile === p + '/' + item.name ? ' active' : '');
            el.innerHTML = `<span class="fb-icon">${item.isDir ? '📂' : fileIcon(item.name)}</span>
                            <span>${item.name}</span>`;
            el.title = item.name;
            el.addEventListener('click', () => {
              const fullPath = p + '/' + item.name;
              if (item.isDir) {
                fbLoad(fullPath);
              } else {
                openFile(fullPath, el);
              }
            });
            list.appendChild(el);
          });
        })
        .catch(() => {});
    }

    function fileIcon(name) {
      const ext = name.split('.').pop().toLowerCase();
      const icons = { js: '📜', ts: '📜', jsx: '📜', tsx: '📜', py: '🐍', json: '{}',
                      md: '📝', html: '🌐', css: '🎨', sh: '⚙', yml: '⚙', yaml: '⚙',
                      txt: '📄', go: '🔷', rs: '🦀', java: '☕', rb: '💎' };
      return icons[ext] || '📄';
    }

    function openFile(filePath, itemEl) {
      if (editorDirty) {
        if (!confirm('Discard unsaved changes?')) return;
      }
      document.querySelectorAll('.fb-item.active').forEach(e => e.classList.remove('active'));
      if (itemEl) itemEl.classList.add('active');
      fbActiveFile = filePath;

      fetch('/api/file?path=' + encodeURIComponent(filePath))
        .then(r => r.json())
        .then(({ content, error }) => {
          if (error) { alert('Cannot open: ' + error); return; }
          const ta = document.getElementById('editor-textarea');
          const ph = document.getElementById('editor-placeholder');
          const fname = document.getElementById('editor-filename');
          const saveBtn = document.getElementById('editor-save');
          const closeBtn = document.getElementById('editor-close');
          fname.textContent = filePath.split('/').pop();
          fname.title = filePath;
          ta.value = content;
          ta.style.display = 'block';
          ph.style.display = 'none';
          saveBtn.style.display = '';
          closeBtn.style.display = '';
          editorDirty = false;
          markSaved(true);
          setTimeout(() => fitAndScroll(), 60);
        })
        .catch(() => alert('Failed to load file'));
    }

    function markSaved(saved) {
      const btn = document.getElementById('editor-save');
      if (saved) {
        btn.textContent = 'Saved';
        btn.classList.add('saved');
      } else {
        btn.textContent = 'Save';
        btn.classList.remove('saved');
      }
    }

    document.getElementById('editor-textarea').addEventListener('input', () => {
      if (!editorDirty) {
        editorDirty = true;
        markSaved(false);
      }
    });

    // Tab key in editor → insert spaces
    document.getElementById('editor-textarea').addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const ta = e.target;
        const start = ta.selectionStart;
        const end = ta.selectionEnd;
        ta.value = ta.value.substring(0, start) + '  ' + ta.value.substring(end);
        ta.selectionStart = ta.selectionEnd = start + 2;
        editorDirty = true;
        markSaved(false);
      }
      // Ctrl/Cmd+S to save
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        saveFile();
      }
    });

    document.getElementById('editor-save').addEventListener('click', saveFile);

    function saveFile() {
      if (!fbActiveFile) return;
      const content = document.getElementById('editor-textarea').value;
      fetch('/api/file', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: fbActiveFile, content }),
      })
        .then(r => r.json())
        .then(({ ok, error }) => {
          if (ok) { editorDirty = false; markSaved(true); }
          else alert('Save failed: ' + error);
        })
        .catch(() => alert('Save request failed'));
    }

    document.getElementById('editor-close').addEventListener('click', () => {
      if (editorDirty && !confirm('Discard unsaved changes?')) return;
      // Reset to placeholder state (panel stays visible on desktop)
      document.getElementById('editor-textarea').style.display = 'none';
      document.getElementById('editor-placeholder').style.display = '';
      document.getElementById('editor-filename').textContent = 'No file open';
      document.getElementById('editor-save').style.display = 'none';
      document.getElementById('editor-close').style.display = 'none';
      document.querySelectorAll('.fb-item.active').forEach(e => e.classList.remove('active'));
      fbActiveFile = null;
      editorDirty = false;
      setTimeout(() => fitAndScroll(), 60);
    });

    document.getElementById('fb-up').addEventListener('click', () => {
      if (!fbCurrentPath) return;
      const parent = fbCurrentPath.split('/').slice(0, -1).join('/');
      if (parent && parent.length >= (location.origin + '/').length) fbLoad(parent);
    });

    // Bootstrap file browser on page load if desktop + dir in URL
    (function initFb() {
      const dir = dirFromPath();
      if (dir && window.matchMedia('(min-width: 900px)').matches) {
        fetch('/api/dirs')
          .then(r => r.json())
          .then(({ base }) => { if (base) fbLoad(base + '/' + dir); })
          .catch(() => {});
      }
    })();

    // Auto-load file browser to the project dir when a session is attached
    function maybeFbLoad(dir) {
      if (!window.matchMedia('(min-width: 900px)').matches) return;
      if (!dir) return;
      fetch('/api/dirs')
        .then(r => r.json())
        .then(({ base }) => { if (base) fbLoad(base + '/' + dir); })
        .catch(() => {});
    }

    // ── Drag-to-resize panels ─────────────────────────────────────────────────
    function makeDraggable(handleId, leftPanel, rightPanel) {
      const handle = document.getElementById(handleId);
      if (!handle) return;
      let dragging = false;
      let startX, startLeft, startRight;

      handle.addEventListener('mousedown', (e) => {
        dragging = true;
        startX = e.clientX;
        startLeft  = leftPanel.getBoundingClientRect().width;
        startRight = rightPanel.getBoundingClientRect().width;
        handle.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
      });

      document.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const dx = e.clientX - startX;
        const newLeft  = Math.max(120, startLeft + dx);
        const newRight = Math.max(120, startRight - dx);
        leftPanel.style.width  = newLeft  + 'px';
        rightPanel.style.width = newRight + 'px';
        fitAndScroll();
      });

      document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        handle.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        fitAndScroll();
      });
    }

    makeDraggable('drag-1', document.getElementById('file-browser'),  document.getElementById('editor-panel'));
    makeDraggable('drag-2', document.getElementById('editor-panel'),   document.getElementById('terminal-column'));
  </script>
</body>
</html>
