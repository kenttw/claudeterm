<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ClaudeTerm</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/vs2015.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/languages/python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/languages/json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/languages/markdown.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/languages/bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/languages/yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.1/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #1e1e1e; overflow: hidden; display: flex; flex-direction: column; }

    /* ── Desktop 3-column layout ──────────────────────────────────────────── */
    #main-area {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: row;
      overflow: hidden;
    }

    /* Drag handle between panels */
    .drag-handle {
      width: 5px;
      flex-shrink: 0;
      background: #2a2a2a;
      cursor: col-resize;
      transition: background 0.15s;
      z-index: 10;
    }
    .drag-handle:hover, .drag-handle.dragging { background: #0e8; }

    /* File browser — desktop only */
    #file-browser {
      display: none;
      flex-direction: column;
      width: 200px;
      min-width: 120px;
      background: #1e1e1e;
      flex-shrink: 0;
      overflow: hidden;
    }
    #file-browser-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      font-size: 11px;
      color: #777;
      font-family: Menlo, Monaco, monospace;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
      overflow: hidden;
    }
    #fb-path {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }
    #fb-up {
      cursor: pointer;
      padding: 2px 5px;
      color: #888;
      font-size: 13px;
      flex-shrink: 0;
    }
    #fb-up:hover { color: #fff; }
    #fb-switch { cursor: pointer; padding: 2px 5px; color: #888; font-size: 12px; flex-shrink: 0; }
    #fb-switch:hover { color: #fff; }
    #fb-list {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #444 transparent;
    }
    .fb-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      font-size: 12px;
      font-family: Menlo, Monaco, monospace;
      color: #c8c8c8;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      user-select: none;
    }
    .fb-item:hover { background: #2a2d2e; }
    .fb-item.active { background: #37373d; color: #fff; }
    .fb-item .fb-icon { flex-shrink: 0; font-size: 16px; }
    .fb-item.git-modified > span:last-child { color: #e2c08d; }
    .fb-item.git-staged   > span:last-child { color: #73c991; }
    .fb-item.git-untracked > span:last-child { color: #73c991; }
    .fb-item .fb-ask-btn { display: none; margin-left: auto; padding: 1px 5px; font-size: 11px; background: #0e8; color: #000; border: none; border-radius: 3px; cursor: pointer; flex-shrink: 0; line-height: 1.4; }
    .fb-item:hover .fb-ask-btn { display: block; }

    /* Editor panel — desktop only, col 2 */
    #editor-panel {
      display: none;
      flex-direction: column;
      width: 380px;
      min-width: 160px;
      background: #1e1e1e;
      flex-shrink: 0;
      overflow: hidden;
    }
    #editor-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      font-size: 11px;
      color: #888;
      font-family: Menlo, Monaco, monospace;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }
    #editor-filename {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #d4d4d4;
    }
    #editor-save {
      padding: 2px 8px;
      background: #0e8;
      color: #000;
      border: none;
      border-radius: 4px;
      font-size: 11px;
      font-family: Menlo, Monaco, monospace;
      cursor: pointer;
      flex-shrink: 0;
    }
    #editor-save:hover { background: #0fa; }
    #editor-save.saved { background: #555; color: #888; cursor: default; }
    #editor-close {
      color: #666;
      cursor: pointer;
      font-size: 16px;
      flex-shrink: 0;
      line-height: 1;
      padding: 0 2px;
    }
    #editor-close:hover { color: #f66; }
    #editor-tabs {
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
      background: #252526;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }
    #editor-tabs:empty { display: none; }
    #editor-tabs::-webkit-scrollbar { display: none; }
    .editor-tab {
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 5px 8px 5px 10px;
      font-size: 11px;
      font-family: Menlo, Monaco, monospace;
      color: #888;
      cursor: pointer;
      white-space: nowrap;
      border-right: 1px solid #2a2a2a;
      user-select: none;
      max-width: 160px;
      flex-shrink: 0;
    }
    .editor-tab:hover { color: #ccc; background: #2a2d2e; }
    .editor-tab.active { color: #fff; background: #1e1e1e; border-bottom: 2px solid #0e8; }
    .editor-tab .tab-name { overflow: hidden; text-overflow: ellipsis; max-width: 115px; }
    .editor-tab.dirty .tab-name::after { content: ' ●'; color: #f90; font-size: 9px; }
    .editor-tab .tab-close { color: #555; font-size: 12px; flex-shrink: 0; padding: 0 1px; }
    .editor-tab .tab-close:hover { color: #f66; }
    .editor-modes { display: none; gap: 2px; flex-shrink: 0; }
    .editor-modes button { padding: 1px 7px; font-size: 10px; font-family: Menlo, Monaco, monospace; background: #333; color: #888; border: 1px solid #444; border-radius: 3px; cursor: pointer; }
    .editor-modes button:hover { color: #ccc; border-color: #666; }
    .editor-modes button.active { background: #0e8; color: #000; border-color: #0e8; }
    #editor-code-view { display: none; flex: 1; min-height: 0; overflow: hidden; flex-direction: row; }
    #editor-line-nums { padding: 10px 8px; text-align: right; color: #555; font-size: 13px; font-family: Menlo, Monaco, "Courier New", monospace; line-height: 1.5; user-select: none; border-right: 1px solid #2d2d2d; background: #1a1a1a; flex-shrink: 0; overflow: hidden; white-space: pre; min-width: 36px; }
    #editor-code-view pre { flex: 1; margin: 0; padding: 10px; font-size: 13px; font-family: Menlo, Monaco, "Courier New", monospace; line-height: 1.5; tab-size: 2; background: #1e1e1e !important; overflow: auto; scrollbar-width: thin; scrollbar-color: #444 transparent; }
    #editor-code-view pre code { background: transparent !important; }
    #editor-preview { display: none; flex: 1; min-height: 0; overflow: auto; padding: 14px 16px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 14px; color: #d4d4d4; line-height: 1.6; scrollbar-width: thin; scrollbar-color: #444 transparent; }
    #editor-preview h1,#editor-preview h2,#editor-preview h3 { color: #fff; margin: 16px 0 8px; border-bottom: 1px solid #333; padding-bottom: 4px; }
    #editor-preview h1 { font-size: 1.6em; } #editor-preview h2 { font-size: 1.3em; } #editor-preview h3 { font-size: 1.1em; border: none; }
    #editor-preview code { background: #2a2a2a; padding: 2px 5px; border-radius: 3px; font-family: Menlo, Monaco, monospace; font-size: 0.9em; }
    #editor-preview pre { background: #2a2a2a; padding: 10px; border-radius: 6px; overflow-x: auto; margin: 8px 0; }
    #editor-preview pre code { padding: 0; background: transparent; }
    #editor-preview table { border-collapse: collapse; width: 100%; margin: 8px 0; }
    #editor-preview th,#editor-preview td { border: 1px solid #444; padding: 6px 10px; text-align: left; }
    #editor-preview th { background: #2a2a2a; color: #fff; }
    #editor-preview a { color: #4da6ff; } #editor-preview blockquote { border-left: 3px solid #555; padding-left: 12px; color: #999; margin: 8px 0; }
    #editor-preview ul,#editor-preview ol { padding-left: 24px; margin: 6px 0; } #editor-preview img { max-width: 100%; }
    #editor-notebook { display: none; flex: 1; min-height: 0; overflow: auto; padding: 10px; scrollbar-width: thin; scrollbar-color: #444 transparent; }
    .nb-cell { margin-bottom: 8px; border: 1px solid #333; border-radius: 6px; overflow: hidden; }
    .nb-cell-header { font-size: 10px; font-family: Menlo, Monaco, monospace; color: #666; padding: 3px 8px; background: #252526; border-bottom: 1px solid #333; }
    .nb-cell-code pre { margin: 0; padding: 8px; font-size: 12px; line-height: 1.4; background: #1e1e1e !important; }
    .nb-cell-code pre code { background: transparent !important; color: #d4d4d4; }
    .nb-cell-md { padding: 8px 12px; font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 13px; color: #d4d4d4; line-height: 1.5; }
    .nb-cell-md h1,.nb-cell-md h2,.nb-cell-md h3 { color: #fff; margin: 8px 0 4px; }
    .nb-cell-md code { background: #2a2a2a; padding: 1px 4px; border-radius: 3px; font-family: Menlo, Monaco, monospace; font-size: 0.9em; }
    .nb-cell-md pre { background: #2a2a2a; padding: 8px; border-radius: 4px; overflow-x: auto; } .nb-cell-md pre code { padding: 0; background: transparent; }
    .nb-cell-output { padding: 6px 8px; background: #1a1a2e; border-top: 1px solid #333; font-family: Menlo, Monaco, monospace; font-size: 12px; color: #aaa; white-space: pre-wrap; word-break: break-all; max-height: 300px; overflow: auto; }
    #editor-image { display: none; flex: 1; min-height: 0; overflow: auto; padding: 10px; text-align: center; background: #181818; }
    #editor-image img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 4px; }
    #editor-html-preview { display: none; flex: 1; min-height: 0; border: none; background: #fff; }
    #editor-csv { display: none; flex: 1; min-height: 0; overflow: auto; padding: 10px; scrollbar-width: thin; scrollbar-color: #444 transparent; }
    #editor-csv table { border-collapse: collapse; width: 100%; font-family: Menlo, Monaco, monospace; font-size: 12px; }
    #editor-csv th { background: #2a2a2a; color: #fff; padding: 6px 10px; border: 1px solid #444; text-align: left; position: sticky; top: 0; }
    #editor-csv td { padding: 5px 10px; border: 1px solid #333; color: #d4d4d4; }
    #editor-csv tr:hover td { background: #2a2d2e; }
    #editor-placeholder {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #444;
      font-family: Menlo, Monaco, monospace;
      font-size: 13px;
    }
    #editor-textarea {
      display: none;
      flex: 1;
      min-height: 0;
      width: 100%;
      background: #1e1e1e;
      color: #d4d4d4;
      border: none;
      outline: none;
      padding: 10px;
      font-size: 13px;
      font-family: Menlo, Monaco, "Courier New", monospace;
      line-height: 1.5;
      resize: none;
      tab-size: 2;
    }

    /* Terminal column — col 3, takes remaining space */
    #terminal-column {
      flex: 1;
      min-width: 200px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #terminal { flex: 1; min-height: 0; width: 100%; }

    /* Split mode: two panes side by side */
    #terminal-column.split-mode {
      flex-direction: row;
    }
    .term-pane {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }
    .term-pane + .term-pane {
      border-left: 2px solid #333;
    }
    .term-pane.pane-focused {
      border-top: 2px solid #0e8;
    }
    .pane-header {
      display: flex;
      align-items: center;
      background: #252526;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
      height: 24px;
      font-size: 12px;
      font-family: Menlo, Monaco, monospace;
      padding: 0 8px;
      color: #888;
      gap: 6px;
      user-select: none;
      cursor: pointer;
    }
    .pane-header-name { color: #ccc; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pane-header-hint { font-size: 10px; color: #555; }
    .pane-no-session {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-family: Menlo, Monaco, monospace;
      font-size: 13px;
    }
    .pane-term-wrap {
      flex: 1;
      min-height: 0;
      width: 100%;
    }
    #btn-split {
      padding: 6px 10px;
      color: #888;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
      font-family: Menlo, Monaco, monospace;
    }
    #btn-split:hover { color: #fff; }
    #btn-split.active { color: #0e8; }

    /* Show file browser + editor on desktop */
    @media (min-width: 900px) {
      #file-browser { display: flex; }
      #editor-panel { display: flex; }
      .drag-handle { display: block; }
      #toolbar-branch { margin-left: auto !important; }
    }

    /* Hide branch badge on mobile (toolbar space too tight) */
    @media (max-width: 899px) {
      #toolbar-branch { display: none !important; }
    }
    @media (max-width: 899px) {
      .drag-handle { display: none; }
    }

    /* Session bar */
    #session-bar {
      display: flex;
      align-items: center;
      background: #252526;
      border-bottom: 1px solid #444;
      overflow-x: auto;
      overflow-y: hidden;
      flex-shrink: 0;
      min-height: 36px;
      scrollbar-width: none;
      white-space: nowrap;
      flex-wrap: nowrap;
    }
    #session-bar::-webkit-scrollbar { display: none; }

    #session-tabs {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
    }

    .session-tab {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 7px 14px;
      color: #888;
      font-size: 14px;
      font-family: Menlo, Monaco, monospace;
      cursor: pointer;
      white-space: nowrap;
      border-right: 1px solid #333;
      user-select: none;
      -webkit-user-select: none;
    }
    .session-tab.active { color: #fff; background: #1e1e1e; border-bottom: 2px solid #0e8; }
    .session-tab.claude-type { border-bottom-color: #f90; }
    .session-tab .claude-icon { font-size: 11px; opacity: 0.8; }
    .session-tab .notes-btn {
      font-size: 11px;
      padding: 0 2px;
      opacity: 0.4;
      cursor: pointer;
      line-height: 1;
    }
    .session-tab .notes-btn:hover { opacity: 1; }
    .session-tab .kill {
      color: #666;
      font-size: 14px;
      padding: 0 2px;
      line-height: 1;
    }
    .session-tab .kill:hover { color: #f66; }
    .session-tab .conn-badge {
      font-size: 10px;
      color: #5bf;
      opacity: 0.85;
      line-height: 1;
    }
    .session-tab .input-hint {
      font-size: 18px;
      color: #ffe000;
      animation: hint-pulse 0.7s ease-in-out infinite alternate;
      line-height: 1;
      display: inline-block;
      filter: drop-shadow(0 0 6px #ffe000);
      vertical-align: middle;
    }
    @keyframes hint-pulse {
      from {
        opacity: 0.3;
        transform: scale(0.8);
        filter: drop-shadow(0 0 3px #ff0);
      }
      to {
        opacity: 1;
        transform: scale(1.6);
        filter: drop-shadow(0 0 10px #ffe000) drop-shadow(0 0 22px #ffa500);
      }
    }

    #btn-new-session {
      padding: 6px 12px;
      color: #888;
      font-size: 18px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      flex-shrink: 0;
    }
    #btn-new-session:hover { color: #fff; }

    /* Directory picker modal */
    #dir-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #dir-modal.show { display: flex; }
    #dir-picker {
      background: #252526;
      border: 1px solid #555;
      border-radius: 10px;
      width: 88vw;
      max-width: 400px;
      max-height: 70vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #dir-picker-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      font-size: 13px;
      color: #888;
      font-family: Menlo, Monaco, monospace;
      border-bottom: 1px solid #444;
      flex-shrink: 0;
    }
    #dir-picker-up:hover { color: #fff; }
    #dir-list {
      overflow-y: auto;
      flex: 1;
    }
    .dir-item {
      padding: 12px 16px;
      font-family: Menlo, Monaco, monospace;
      font-size: 13px;
      color: #d4d4d4;
      cursor: pointer;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dir-item:active { background: #3a3a3a; }
    #dir-cancel {
      padding: 12px;
      text-align: center;
      color: #888;
      font-size: 13px;
      cursor: pointer;
      border-top: 1px solid #444;
      flex-shrink: 0;
    }
    #dir-cancel:active { background: #3a3a3a; }

    /* Kill confirm modal */
    #kill-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    #kill-modal.show { display: flex; }
    #kill-dialog {
      background: #252526;
      border: 1px solid #555;
      border-radius: 12px;
      width: 80vw;
      max-width: 320px;
      overflow: hidden;
    }
    #kill-dialog-title {
      padding: 16px;
      font-size: 14px;
      color: #d4d4d4;
      font-family: Menlo, Monaco, monospace;
      text-align: center;
      border-bottom: 1px solid #444;
    }
    #kill-dialog-name {
      color: #fff;
      font-weight: bold;
    }
    .kill-dialog-btns {
      display: flex;
    }
    .kill-dialog-btns button {
      flex: 1;
      padding: 14px;
      font-size: 14px;
      font-family: Menlo, Monaco, monospace;
      border: none;
      cursor: pointer;
      background: transparent;
    }
    #kill-cancel-btn {
      color: #888;
      border-right: 1px solid #444;
    }
    #kill-cancel-btn:active { background: #3a3a3a; }
    #kill-confirm-btn {
      color: #f66;
      font-weight: bold;
    }
    #kill-confirm-btn:active { background: #3a3a3a; }

    #rate-limit-banner {
      display: none;
      background: #2a1800;
      border-bottom: 1px solid #664400;
      color: #f90;
      font-family: Menlo, Monaco, monospace;
      font-size: 12px;
      padding: 5px 12px;
      text-align: center;
      flex-shrink: 0;
    }

    #no-session {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-family: Menlo, Monaco, monospace;
      font-size: 14px;
    }

    /* Toolbar */
    #toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      flex-wrap: nowrap;
      gap: 4px;
      padding: 6px 8px;
      background: #2d2d2d;
      border-top: 1px solid #444;
      flex-shrink: 0;
    }

    #toolbar button {
      flex: 1;
      background: #3a3a3a;
      color: #d4d4d4;
      border: 1px solid #555;
      border-radius: 6px;
      padding: 8px 4px;
      font-size: 13px;
      font-family: Menlo, Monaco, monospace;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      min-width: 40px;
      min-height: 36px;
      line-height: 1.2;
      text-align: center;
    }
    #toolbar button:active { background: #555; border-color: #888; }

    .arrow-group-unused {
      display: grid;
      grid-template-columns: 34px 34px 34px;
      grid-template-rows: 30px 30px;
      gap: 3px;
    }
    .arrow-group button {
      padding: 4px;
      min-width: unset;
      min-height: unset;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .arrow-up    { grid-column: 2; grid-row: 1; }
    .arrow-left  { grid-column: 1; grid-row: 2; }
    .arrow-down  { grid-column: 2; grid-row: 2; }
    .arrow-right { grid-column: 3; grid-row: 2; }
  </style>
</head>
<body>

  <!-- Kill confirm modal -->
  <div id="kill-modal">
    <div id="kill-dialog">
      <div id="kill-dialog-title">Close session <span id="kill-dialog-name"></span>?</div>
      <div class="kill-dialog-btns">
        <button id="kill-cancel-btn">Cancel</button>
        <button id="kill-confirm-btn">Close</button>
      </div>
    </div>
  </div>

  <!-- Directory picker modal -->
  <div id="dir-modal">
    <div id="dir-picker">
      <div id="dir-picker-header">
        <span id="dir-picker-up" title="Up" style="cursor:pointer;font-size:14px;color:#888">↑</span>
        <span id="dir-picker-path" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#d4d4d4">~/git</span>
      </div>
      <div id="dir-list"></div>
      <div id="dir-picker-select" style="display:none;padding:12px;text-align:center;color:#0e8;font-size:13px;font-family:Menlo,Monaco,monospace;font-weight:bold;cursor:pointer;border-top:1px solid #444">✓ Use this directory</div>
      <div id="dir-cancel">Cancel</div>
    </div>
  </div>

  <!-- Session bar -->
  <div id="session-bar">
    <div id="session-tabs"></div>
    <div id="btn-new-session" title="New session">＋</div>
    <div id="btn-split" title="Split view">⊟</div>
    <div id="split-target-hint" style="display:none;font-size:11px;color:#0e8;font-family:Menlo,Monaco,monospace;padding:0 6px;align-self:center;"></div>
  </div>

  <!-- Main area: file list | drag | editor/preview | drag | terminal -->
  <div id="main-area">

    <!-- Col 1: file browser (desktop only) -->
    <div id="file-browser">
      <div id="file-browser-header">
        <span id="fb-up" title="Up">↑</span>
        <span id="fb-path">~/git</span>
        <span id="fb-switch" title="Switch directory">⇄</span>
      </div>
      <div id="fb-list"></div>
    </div>

    <div class="drag-handle" id="drag-1"></div>

    <!-- Col 2: file preview/editor (desktop only) -->
    <div id="editor-panel">
      <div id="editor-tabs"></div>
      <div id="editor-header">
        <span id="editor-filename">No file open</span>
        <span class="editor-modes" id="editor-modes">
          <button data-mode="edit">Edit</button>
          <button data-mode="code" class="active">Code</button>
          <button data-mode="preview" id="btn-mode-preview" style="display:none">Preview</button>
        </span>
        <button id="editor-save" class="saved" style="display:none">Saved</button>
        <span id="editor-close" style="display:none">×</span>
      </div>
      <div id="editor-placeholder">← click a file to preview</div>
      <textarea id="editor-textarea" spellcheck="false"></textarea>
      <div id="editor-code-view"><div id="editor-line-nums"></div><pre><code></code></pre></div>
      <div id="editor-preview"></div>
      <div id="editor-notebook"></div>
      <div id="editor-image"></div>
      <div id="editor-csv"></div>
      <iframe id="editor-html-preview" sandbox="allow-scripts allow-same-origin" style="display:none"></iframe>
    </div>

    <div class="drag-handle" id="drag-2"></div>

    <!-- Col 3: terminal -->
    <div id="terminal-column">
      <!-- Rate limit notification banner -->
      <div id="rate-limit-banner"><span id="rate-limit-msg"></span></div>
      <!-- Pane 0 (always visible) -->
      <div class="term-pane pane-focused" id="pane-0">
        <div class="pane-header" id="pane-0-header" style="display:none">
          <span class="pane-header-hint">◀ L</span>
          <span class="pane-header-name" id="pane-0-header-name">—</span>
        </div>
        <div class="pane-no-session" id="pane-0-nosession">No session — tap ＋ to start</div>
        <div class="pane-term-wrap" id="pane-0-term" style="display:none"></div>
      </div>
      <!-- Pane 1 (only in split mode) -->
      <div class="term-pane" id="pane-1" style="display:none">
        <div class="pane-header" id="pane-1-header">
          <span class="pane-header-hint">▶ R</span>
          <span class="pane-header-name" id="pane-1-header-name">— click a tab above to attach —</span>
        </div>
        <div class="pane-no-session" id="pane-1-nosession" style="display:none"></div>
        <div class="pane-term-wrap" id="pane-1-term" style="display:none"></div>
      </div>
    </div>

  </div>

  <!-- Toolbar -->
  <div id="toolbar">
    <button id="btn-tab">Tab</button>
    <button id="btn-enter">Enter</button>
    <button id="btn-bksp">⌫</button>
    <button id="btn-ctrlc">^C</button>
    <button id="btn-1">1</button>
    <button id="btn-claude"><small style="font-size:10px;opacity:0.7">claude</small></button>
    <button id="btn-continue">cont<br><small style="font-size:10px;opacity:0.7">inue</small></button>
    <button id="btn-next">do next<br><small style="font-size:10px;opacity:0.7">item</small></button>
    <button id="btn-folder" title="Switch folder">📂<br><small style="font-size:10px;opacity:0.7">folder</small></button>
    <button id="btn-up">▲</button>
    <button id="btn-down">▼</button>
    <span id="toolbar-branch" style="font-size:13px;color:#0e8;background:#0a2e1a;padding:2px 9px;border-radius:8px;border:1px solid #0a6;white-space:nowrap;display:none;align-self:center;flex-shrink:0;"></span>
  </div>

  <script>
    // ── Pane management ──────────────────────────────────────────────────────────
    const panes = [];
    let activePaneIdx = 0;
    let splitMode = false;

    function createPane(idx) {
      const termWrap = document.getElementById('pane-' + idx + '-term');
      const term = new Terminal({
        cursorBlink: true,
        fontFamily: 'Menlo, Monaco, "Courier New", monospace',
        fontSize: 14,
        scrollback: 50000,
        theme: { background: '#1e1e1e', foreground: '#d4d4d4', cursor: '#ffffff' },
      });
      const fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.open(termWrap);

      term.attachCustomKeyEventHandler((e) => {
        if (e.altKey && e.type === 'keydown') {
          if (e.key === 'ArrowLeft')  { switchSessionByOffset(-1, idx); return false; }
          if (e.key === 'ArrowRight') { switchSessionByOffset(+1, idx); return false; }
        }
        return true;
      });

      termWrap.addEventListener('mousedown', () => setActivePane(idx));
      // Also allow focusing by clicking the pane container (e.g. header area when no session yet)
      const paneEl = document.getElementById('pane-' + idx);
      if (paneEl) paneEl.addEventListener('mousedown', () => setActivePane(idx));

      const pane = { idx, term, fitAddon, ws: null, sessionId: null, inputBuffer: '' };
      panes[idx] = pane;

      term.onData((data) => {
        if (isTerminalResponse(data)) return;
        panesSend(idx, data);
        if (data === '\r') {
          const line = pane.inputBuffer.trim();
          const escapedCmd = claudeCmd.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          if (new RegExp('^' + escapedCmd + '\\s*$').test(line)) paneRenameSession(idx, 'Claude');
          pane.inputBuffer = '';
        } else if (data === '\x7f') {
          pane.inputBuffer = pane.inputBuffer.slice(0, -1);
        } else if (data.length === 1 && data >= ' ') {
          pane.inputBuffer += data;
        }
      });
      term.onTitleChange((title) => {
        if (pane.sessionId && title) paneRenameSession(idx, title);
      });
      term.onResize(({ cols, rows }) => {
        if (pane.ws && pane.ws.readyState === WebSocket.OPEN)
          pane.ws.send(JSON.stringify({ type: 'resize', cols, rows }));
      });
      return pane;
    }

    function setActivePane(idx) {
      activePaneIdx = idx;
      panes.forEach((p, i) => {
        document.getElementById('pane-' + i).classList.toggle('pane-focused', i === idx);
      });
      if (splitMode) {
        const hint = document.getElementById('split-target-hint');
        hint.textContent = '→ ' + (idx === 0 ? 'L' : 'R');
      }
    }

    function panesSend(idx, data) {
      const pane = panes[idx];
      if (pane && pane.ws && pane.ws.readyState === WebSocket.OPEN)
        pane.ws.send(JSON.stringify({ type: 'input', data }));
    }

    function send(data) { panesSend(activePaneIdx, data); }

    function paneRenameSession(idx, name) {
      const pane = panes[idx];
      if (pane && pane.sessionId && pane.ws && pane.ws.readyState === WebSocket.OPEN)
        pane.ws.send(JSON.stringify({ type: 'session.rename', id: pane.sessionId, name }));
    }

    function switchSessionByOffset(offset, paneIdx) {
      const currentDir = dirFromPath();
      const visible = currentDir ? allSessions.filter(s => s.dir === currentDir) : allSessions;
      if (visible.length < 2) return;
      const pane = panes[paneIdx];
      const idx = visible.findIndex(s => s.id === pane.sessionId);
      const next = visible[(idx + offset + visible.length) % visible.length];
      if (next) attachSessionToPane(paneIdx, next.id);
    }

    document.addEventListener('keydown', (e) => {
      if (e.altKey && !e.ctrlKey && !e.metaKey) {
        if (e.key === 'ArrowLeft')  { e.preventDefault(); switchSessionByOffset(-1, activePaneIdx); }
        if (e.key === 'ArrowRight') { e.preventDefault(); switchSessionByOffset(+1, activePaneIdx); }
      }
    });

    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    let wsToken = null;

    // Compatibility shims so existing code using currentSessionId / ws still works
    Object.defineProperty(window, 'currentSessionId', {
      get: () => panes[0] ? panes[0].sessionId : null,
      set: (v) => { if (panes[0]) panes[0].sessionId = v; },
    });
    Object.defineProperty(window, 'ws', {
      get: () => {
        const p = panes[activePaneIdx] || panes[0];
        return p ? p.ws : null;
      },
    });

    let allSessions = [];
    let rateLimitTimerId = null;
    const sessionNeedsInput = new Set();

    // ── Boot: create pane 0, open its WS ────────────────────────────────────────
    createPane(0);
    fetch('/api/token')
      .then(r => r.json())
      .then(({ token }) => {
        wsToken = token;
        openPaneWs(0, token);
      })
      .catch(() => {
        document.getElementById('pane-0-nosession').textContent = 'Auth failed — please reload.';
      });

    function showRateLimit(retryAfter) {
      clearTimeout(rateLimitTimerId);
      const banner = document.getElementById('rate-limit-banner');
      const msg = document.getElementById('rate-limit-msg');
      banner.style.display = '';
      if (retryAfter > 0) {
        let remaining = retryAfter;
        const tick = () => {
          msg.textContent = `\u26a0 Rate limited — retrying in ${remaining}s`;
          if (remaining <= 0) { hideRateLimit(); return; }
          remaining--;
          rateLimitTimerId = setTimeout(tick, 1000);
        };
        tick();
      } else {
        msg.textContent = '\u26a0 Rate limited — waiting...';
        rateLimitTimerId = setTimeout(hideRateLimit, 65000);
      }
    }

    function hideRateLimit() {
      clearTimeout(rateLimitTimerId);
      document.getElementById('rate-limit-banner').style.display = 'none';
    }
    let claudeCmd = 'claude'; // overwritten by /api/config

    fetch('/api/config')
      .then(r => r.json())
      .then(cfg => {
        claudeCmd = cfg.claudeCommand || 'claude';
        const btn = document.getElementById('btn-claude');
        const parts = claudeCmd.split(' ');
        btn.innerHTML = parts.slice(0, -1).join(' ') + (parts.length > 1 ? '<br>' : '') +
          `<small style="font-size:10px;opacity:0.7">${parts[parts.length - 1]}</small>`;
      })
      .catch(() => {});

    function showTerminal(show, paneIdx) {
      const idx = paneIdx !== undefined ? paneIdx : 0;
      document.getElementById('pane-' + idx + '-term').style.display = show ? '' : 'none';
      document.getElementById('pane-' + idx + '-nosession').style.display = show ? 'none' : '';
      if (show) {
        const pane = panes[idx];
        if (pane) setTimeout(() => { pane.fitAddon.fit(); pane.term.scrollToBottom(); }, 50);
      }
    }

    // ── URL routing ────────────────────────────────────────────────────────────
    function parsePath() {
      const parts = location.pathname.replace(/^\/+|\/+$/g, '').split('/').filter(Boolean);
      return { dir: parts[0] || null, sessionName: parts[1] ? decodeURIComponent(parts[1]) : null };
    }

    function dirFromPath() {
      return parsePath().dir;
    }

    function setUrl(dir, sessionName) {
      let url = dir ? '/' + dir : '/';
      if (dir && sessionName) url += '/' + encodeURIComponent(sessionName);
      if (location.pathname !== url) history.pushState({}, '', url);
      document.title = dir ? 'ClaudeTerm-' + dir : 'ClaudeTerm';
    }

    // Called once session list is received — auto-attach or create based on URL
    function autoAttachFromUrl() {
      const { dir, sessionName } = parsePath();
      if (!dir) return;
      // Match by dir + session name if present, otherwise first in dir
      const inDir = allSessions.filter(s => s.dir === dir);
      const match = sessionName
        ? (inDir.find(s => s.name === sessionName) || inDir[0])
        : inDir[0];
      if (match) {
        if (match.id !== currentSessionId) attachSession(match.id);
      } else {
        ws.send(JSON.stringify({ type: 'session.create', name: 'session_1', cwd: '__BASE__/' + dir }));
      }
    }

    // Handle browser back/forward
    window.addEventListener('popstate', autoAttachFromUrl);

    function renderTabs() {
      const container = document.getElementById('session-tabs');
      container.innerHTML = '';
      const currentDir = dirFromPath();
      const visible = currentDir
        ? allSessions.filter(s => s.dir === currentDir)
        : allSessions;
      visible.forEach(s => {
        const isActive = s.id === currentSessionId;
        const isClaude = s.type === 'claude';
        const tab = document.createElement('div');
        tab.className = 'session-tab' + (isActive ? ' active' : '') + (isClaude ? ' claude-type' : '');

        const label = document.createElement('span');
        label.textContent = s.name;
        if (isClaude) {
          const icon = document.createElement('span');
          icon.className = 'claude-icon';
          icon.textContent = ' ⚡';
          label.appendChild(icon);
        }
        label.addEventListener('click', () => attachSession(s.id));

        tab.appendChild(label);

        if (sessionNeedsInput.has(s.id) && !isActive) {
          const hint = document.createElement('span');
          hint.className = 'input-hint';
          hint.textContent = '★';
          hint.title = 'Waiting for input';
          tab.appendChild(hint);
        }

        if (s.clients > 1) {
          const badge = document.createElement('span');
          badge.className = 'conn-badge';
          badge.textContent = '●' + s.clients;
          badge.title = s.clients + ' connections';
          tab.appendChild(badge);
        }

        const notes = document.createElement('span');
        notes.className = 'notes-btn';
        notes.textContent = '📝';
        notes.title = 'Session notes';
        notes.addEventListener('click', (e) => {
          e.stopPropagation();
          openSessionNotes(s);
        });
        tab.appendChild(notes);

        const kill = document.createElement('span');
        kill.className = 'kill';
        kill.textContent = '×';
        kill.addEventListener('click', (e) => {
          e.stopPropagation();
          showKillConfirm(s.id, s.name);
        });

        tab.appendChild(kill);
        container.appendChild(tab);
      });
    }

    // ── Pane headers: show current session name per pane in split mode ──────────
    function renderPaneHeaders() {
      if (!splitMode) return;
      [0, 1].forEach(paneIdx => {
        const nameEl = document.getElementById('pane-' + paneIdx + '-header-name');
        if (!nameEl) return;
        const pane = panes[paneIdx];
        const session = pane && pane.sessionId ? allSessions.find(s => s.id === pane.sessionId) : null;
        nameEl.textContent = session ? session.name + (session.type === 'claude' ? ' ⚡' : '') : '— click a tab above to attach —';
      });
    }

    // ── Split mode toggle ────────────────────────────────────────────────────────
    function recreatePane0Term() {
      // Destroy the existing xterm instance and recreate it fresh in the
      // (now-split) container. Re-attach to same session so server replays output.
      const p0 = panes[0];
      if (!p0) return;
      const savedSessionId = p0.sessionId;
      const termWrap = document.getElementById('pane-0-term');

      // Dispose old xterm
      try { p0.term.dispose(); } catch (e) {}
      // Clear any canvases left behind
      termWrap.innerHTML = '';

      // Create fresh Terminal in same wrap (now correctly sized for split)
      const term = new Terminal({
        cursorBlink: true,
        fontFamily: 'Menlo, Monaco, "Courier New", monospace',
        fontSize: 14,
        scrollback: 50000,
        theme: { background: '#1e1e1e', foreground: '#d4d4d4', cursor: '#ffffff' },
      });
      const fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.open(termWrap);
      fitAddon.fit();

      // Re-wire event handlers
      term.attachCustomKeyEventHandler((e) => {
        if (e.altKey && e.type === 'keydown') {
          if (e.key === 'ArrowLeft')  { switchSessionByOffset(-1, 0); return false; }
          if (e.key === 'ArrowRight') { switchSessionByOffset(+1, 0); return false; }
        }
        return true;
      });
      termWrap.addEventListener('mousedown', () => setActivePane(0));
      document.getElementById('pane-0').addEventListener('mousedown', () => setActivePane(0));
      term.onData((data) => {
        if (isTerminalResponse(data)) return;
        panesSend(0, data);
        if (data === '\r') {
          const line = p0.inputBuffer.trim();
          const escapedCmd = claudeCmd.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          if (new RegExp('^' + escapedCmd + '\\s*$').test(line)) paneRenameSession(0, 'Claude');
          p0.inputBuffer = '';
        } else if (data === '\x7f') {
          p0.inputBuffer = p0.inputBuffer.slice(0, -1);
        } else if (data.length === 1 && data >= ' ') {
          p0.inputBuffer += data;
        }
      });
      term.onTitleChange((title) => { if (p0.sessionId && title) paneRenameSession(0, title); });
      term.onResize(({ cols, rows }) => {
        if (p0.ws && p0.ws.readyState === WebSocket.OPEN)
          p0.ws.send(JSON.stringify({ type: 'resize', cols, rows }));
      });

      p0.term = term;
      p0.fitAddon = fitAddon;

      // Re-attach to session — server replays output into fresh terminal
      if (savedSessionId && p0.ws && p0.ws.readyState === WebSocket.OPEN) {
        p0.ws.send(JSON.stringify({ type: 'session.attach', id: savedSessionId }));
      }
    }

    function enterSplitMode() {
      splitMode = true;
      document.getElementById('terminal-column').classList.add('split-mode');
      document.getElementById('btn-split').classList.add('active');
      // Show pane-0 header and pane-1
      document.getElementById('pane-0-header').style.display = '';
      document.getElementById('pane-1').style.display = '';
      const hint = document.getElementById('split-target-hint');
      hint.style.display = '';
      hint.textContent = '→ L';

      // Recreate pane-0 xterm so it gets a canvas sized for the split width
      recreatePane0Term();

      // Create pane 1 if needed
      if (!panes[1]) {
        createPane(1);
        fetch('/api/token')
          .then(r => r.json())
          .then(({ token }) => {
            openPaneWs(1, token, () => {
              renderPaneHeaders();
              setTimeout(() => {
                if (panes[1]) { panes[1].fitAddon.fit(); panes[1].term.scrollToBottom(); }
              }, 150);
            });
          });
      }
      renderPaneHeaders();
    }

    function exitSplitMode() {
      splitMode = false;
      document.getElementById('terminal-column').classList.remove('split-mode');
      document.getElementById('btn-split').classList.remove('active');
      document.getElementById('pane-0-header').style.display = 'none';
      document.getElementById('pane-1').style.display = 'none';
      document.getElementById('split-target-hint').style.display = 'none';
      // Close pane 1 WS
      if (panes[1] && panes[1].ws) {
        panes[1].ws.close();
        panes[1].ws = null;
        panes[1].sessionId = null;
      }
      setActivePane(0);
      // Recreate pane-0 xterm so it gets a canvas sized for full width
      recreatePane0Term();
    }

    document.getElementById('btn-split').addEventListener('click', () => {
      splitMode ? exitSplitMode() : enterSplitMode();
    });

    async function openSessionNotes(session) {
      const { base } = await fetch('/api/dirs').then(r => r.json());
      const cleanName = session.name.replace(/^[^\w]+/, '').trim() || session.name;
      const notesPath = base + '/' + session.dir + '/sessions/' + cleanName + '.md';
      const relNotesPath = 'sessions/' + cleanName + '.md';

      // Create file with template if it doesn't exist
      const check = await fetch('/api/file?path=' + encodeURIComponent(notesPath)).then(r => r.json());
      if (check.error) {
        const template = [
          '# ' + cleanName,
          '',
          '## Key Points',
          '- ',
          '',
          '## Related Files',
          '- ',
          '',
          '## Tickets / Confluence',
          '- ',
          '',
        ].join('\n');
        await fetch('/api/file', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path: notesPath, content: template })
        });
      }

      openFile(notesPath, null);

      // If claude session, attach it and ask Claude to summarise into the notes file
      if (session.type === 'claude') {
        if (session.id !== currentSessionId) {
          attachSession(session.id);
          await new Promise(r => setTimeout(r, 400));
        }
        const prompt = `Please update ${relNotesPath} with a summary of our work so far. Include: 1) Key Points — major decisions and findings, 2) Related Files — important .md files referenced, 3) Tickets / Confluence — any Jira tickets or Confluence links mentioned. Keep each section concise.\r`;
        send(prompt);
      }
    }

    // attachSession — in split mode routes to the focused pane, otherwise pane 0
    function attachSession(id) {
      attachSessionToPane(splitMode ? activePaneIdx : 0, id);
    }

    function attachSessionToPane(paneIdx, id) {
      const pane = panes[paneIdx];
      if (!pane) return;
      pane.term.clear();
      pane.ws.send(JSON.stringify({ type: 'session.attach', id }));
    }

    // Open a new WebSocket for a pane and wire up its message handler
    function openPaneWs(paneIdx, token, onReady) {
      const pane = panes[paneIdx];
      const newWs = new WebSocket(`${protocol}//${location.host}?token=${token}`);
      pane.ws = newWs;

      newWs.onopen = () => { if (onReady) onReady(); };

      newWs.onmessage = (e) => {
        const msg = JSON.parse(e.data);

        if (msg.type === 'output') {
          pane.term.write(msg.data, () => pane.term.scrollToBottom());
        }

        if (msg.type === 'session.hint') {
          const attachedId = panes[paneIdx].sessionId;
          if (msg.id !== attachedId) {
            sessionNeedsInput.add(msg.id);
            renderTabs();
            renderPaneHeaders();
          }
        }

        if (msg.type === 'session.list') {
          // Only pane 0 drives the global session list & URL routing
          if (paneIdx === 0) {
            const firstLoad = allSessions.length === 0;
            allSessions = msg.sessions;
            renderTabs();
            renderPaneHeaders();
            const current = allSessions.find(s => s.id === panes[0].sessionId);
            if (panes[0].sessionId && !current) {
              panes[0].sessionId = null;
              showTerminal(false, 0);
              setUrl(dirFromPath());
            } else if (current) {
              setUrl(current.dir, current.name);
            }
            if (firstLoad) {
              const dir = dirFromPath();
              if (dir) autoAttachFromUrl();
              else openDirPicker();
            }
          } else {
            // pane 1: just refresh its session list view
            allSessions = msg.sessions;
            renderPaneHeaders();
          }
        }

        if (msg.type === 'rate.limited') {
          showRateLimit(msg.retryAfter);
        }

        if (msg.type === 'session.attached') {
          pane.sessionId = msg.id;
          sessionNeedsInput.delete(msg.id);
          if (paneIdx === 0) hideRateLimit();
          showTerminal(true, paneIdx);
          renderTabs();
          renderPaneHeaders();

          // Only pane 0 updates URL, file browser, open files
          if (paneIdx === 0) {
            setUrl(msg.dir, msg.name);
            openFiles = [];
            currentFileIdx = -1;
            editorDirty = false;
            hideAllViews();
            document.getElementById('editor-placeholder').style.display = 'flex';
            document.getElementById('editor-filename').textContent = 'No file open';
            document.getElementById('editor-save').style.display = 'none';
            document.getElementById('editor-close').style.display = 'none';
            document.getElementById('editor-modes').style.display = 'none';
            document.querySelectorAll('.fb-item.active').forEach(e => e.classList.remove('active'));
            renderFileTabs();
            maybeFbLoad(msg.dir);
            if (msg.openFilesList && msg.openFilesList.length > 0) {
              setTimeout(() => restoreOpenFiles(msg.openFilesList, msg.openFilesActive || 0), 300);
            } else if (msg.lastOpenFile) {
              setTimeout(() => openFile(msg.lastOpenFile, null), 300);
            }
            if (msg.dir && msg.name) {
              const cleanName = msg.name.replace(/^[^\w]+/, '').trim() || msg.name;
              fetch('/api/dirs').then(r => r.json()).then(({ base }) => {
                const notesPath = base + '/' + msg.dir + '/sessions/' + cleanName + '.md';
                fetch('/api/file?path=' + encodeURIComponent(notesPath))
                  .then(r => r.json())
                  .then(({ error }) => {
                    if (!error && !openFiles.find(f => f.path === notesPath)) {
                      setTimeout(() => openFile(notesPath, null), 350);
                    }
                  });
              });
            }
          }

          setTimeout(() => {
            pane.fitAddon.fit();
            pane.term.scrollToBottom();
            const { cols, rows } = pane.term;
            if (pane.ws.readyState === WebSocket.OPEN)
              pane.ws.send(JSON.stringify({ type: 'resize', cols, rows }));
          }, 100);
        }
      };

      newWs.onclose = () => {
        if (pane.sessionId) pane.term.write('\r\n\x1b[31mDisconnected.\x1b[0m\r\n');
      };
    }

    // ── File browser ─────────────────────────────────────────────────────────

    function fbLoad(dir) {
      Promise.all([
        fetch('/api/files?path=' + encodeURIComponent(dir)).then(r => r.json()),
        fetch('/api/git-status?path=' + encodeURIComponent(dir)).then(r => r.json()).catch(() => ({ files: {} })),
        fetch('/api/git-branch?path=' + encodeURIComponent(dir)).then(r => r.json()).catch(() => ({ branch: '' }))
      ]).then(([{ path: p, items }, { files: gitFiles }, { branch }]) => {
          fbCurrentPath = p;
          document.getElementById('fb-path').textContent =
            p.replace(location.origin, '').replace(/^.*\/git\//, '~/git/');

            if (gitStatus) cls += ' git-' + gitStatus;
            el.className = cls;
            el.dataset.path = fullItemPath;
            el.innerHTML = `<span class="fb-icon">${item.isDir ? '📂' : fileIcon(item.name)}</span>
                            <span>${item.name}</span>${item.isDir ? '' : '<button class="fb-ask-btn" title="Ask Claude to read this file">Ask</button>'}`;
            el.title = item.name;
            el.addEventListener('click', (e) => {

              if (item.isDir) {
                fbLoad(fullItemPath);

              }

              el.querySelector('.fb-ask-btn').addEventListener('click', (e) => {
                e.stopPropagation();

    function fileIcon(name) {
      const ext = name.split('.').pop().toLowerCase();
      const icons = { js: '📜', ts: '📜', jsx: '📜', tsx: '📜', py: '🐍', json: '{}',
                      md: '📝', html: '🌐', css: '🎨', sh: '⚙', yml: '⚙', yaml: '⚙',
                      txt: '📄', go: '🔷', rs: '🦀', java: '☕', rb: '💎',
                      png: '🖼', jpg: '🖼', jpeg: '🖼', gif: '🖼', svg: '🖼', webp: '🖼',
                      csv: '📊', tsv: '📊', ipynb: '📓' };
      return icons[ext] || '📄';
    }

    // ── Editor modes ───────────────────────────────────────────────────────
    let editorMode = 'code';
    let editorLang = '';

    function extToLang(name) {
      const ext = name.split('.').pop().toLowerCase();
      const m = { py:'python', js:'javascript', ts:'typescript', jsx:'javascript', tsx:'typescript',
        json:'json', md:'markdown', sh:'bash', bash:'bash', yml:'yaml', yaml:'yaml',
        html:'xml', css:'css', go:'go', rs:'rust', java:'java', rb:'ruby', sql:'sql', xml:'xml' };
      return m[ext] || 'plaintext';
    }
    function isNotebook(n) { return n.endsWith('.ipynb'); }
    function isMarkdown(n) { return /\.md$/i.test(n); }
    function isHtml(n) { return /\.html?$/i.test(n); }
    function isImage(n) { return /\.(png|jpg|jpeg|gif|svg|webp|bmp|ico)$/i.test(n); }
    function isCsv(n) { return /\.(csv|tsv)$/i.test(n); }
    function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function hideAllViews() {
      ['editor-textarea','editor-code-view','editor-preview','editor-notebook','editor-image','editor-csv','editor-html-preview'].forEach(
        id => document.getElementById(id).style.display = 'none');
    }

    function showView(mode) {
      hideAllViews();
      editorMode = mode;
      document.querySelectorAll('.editor-modes button').forEach(b =>
        b.classList.toggle('active', b.dataset.mode === mode));
      const ta = document.getElementById('editor-textarea');
      if (mode === 'edit') {
        ta.style.display = 'block';
      } else if (mode === 'code') {
        const codeEl = document.querySelector('#editor-code-view pre code');
        const lang = (editorLang && hljs.getLanguage(editorLang)) ? editorLang : 'plaintext';
        let hl;
        try { hl = hljs.highlight(ta.value, { language: lang, ignoreIllegals: true }).value; }
        catch { hl = escHtml(ta.value); }
        codeEl.innerHTML = hl;
        codeEl.className = 'hljs language-' + lang;
        const lineNums = document.getElementById('editor-line-nums');
        const lineCount = ta.value.split('\n').length;
        lineNums.textContent = Array.from({length: lineCount}, (_, i) => i + 1).join('\n');
        const pre = document.querySelector('#editor-code-view pre');
        pre.onscroll = () => { lineNums.scrollTop = pre.scrollTop; };
        document.getElementById('editor-code-view').style.display = 'flex';
      } else if (mode === 'preview') {
        const curFile = currentFileIdx >= 0 ? openFiles[currentFileIdx] : null;
        if (curFile && isHtml(curFile.fileName)) {
          const iframe = document.getElementById('editor-html-preview');
          iframe.srcdoc = ta.value;
          iframe.style.display = 'block';
        } else {
          document.getElementById('editor-preview').innerHTML = marked.parse(ta.value);
          document.querySelectorAll('#editor-preview pre code').forEach(el => hljs.highlightElement(el));
          document.getElementById('editor-preview').style.display = 'block';
        }
      } else if (mode === 'notebook') {
        document.getElementById('editor-notebook').style.display = 'block';
      }
    }

    document.getElementById('editor-modes').addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-mode]');
      if (btn) {
        showView(btn.dataset.mode);
        if (currentFileIdx >= 0) openFiles[currentFileIdx].mode = btn.dataset.mode;
      }
    });

    function renderNotebook(content) {
      let nb;
      try { nb = JSON.parse(content); } catch { return '<div style="color:#f66;padding:12px">Invalid notebook JSON</div>'; }
      if (!nb || typeof nb !== 'object') return '<div style="color:#f66;padding:12px">Invalid notebook JSON</div>';
      const cells = nb.cells || [];
      const rawLang = (nb.metadata?.kernelspec?.language || 'python').toLowerCase().trim();
      const lang = hljs.getLanguage(rawLang) ? rawLang : 'python';
      let html = '';
      try {
        cells.forEach(cell => {
          const src = Array.isArray(cell.source) ? cell.source.join('') : (cell.source || '');
          if (cell.cell_type === 'code') {
            let hl;
            try { hl = hljs.highlight(src, { language: lang, ignoreIllegals: true }).value; }
            catch { hl = escHtml(src); }
            html += `<div class="nb-cell"><div class="nb-cell-header">In [${cell.execution_count ?? ' '}]</div>
              <div class="nb-cell-code"><pre><code class="hljs language-${lang}">${hl}</code></pre></div>`;
            (cell.outputs || []).forEach(o => {
              let t = '';
              if (o.text) t = [].concat(o.text).join('');
              else if (o.data?.['text/plain']) t = [].concat(o.data['text/plain']).join('');
              if (o.traceback) t = o.traceback.join('\n').replace(/\x1b\[[0-9;]*m/g, '');
              if (t) html += `<div class="nb-cell-output">${escHtml(t)}</div>`;
            });
            html += '</div>';
          } else if (cell.cell_type === 'markdown') {
            html += `<div class="nb-cell"><div class="nb-cell-header">Markdown</div>
              <div class="nb-cell-md">${marked.parse(src)}</div></div>`;
          }
        });
      } catch(e) {
        return `<div style="color:#f66;padding:12px">Notebook render error: ${escHtml(String(e))}</div>`;
      }
      return html || '<div style="color:#666;padding:12px">Empty notebook</div>';
    }

    function renderCsv(content, fileName) {
      const sep = /\.tsv$/i.test(fileName) ? '\t' : ',';
      const rows = content.split('\n').filter(r => r.trim());
      if (rows.length === 0) return '<div style="color:#666;padding:12px">Empty file</div>';
      // Simple CSV parse (handles quoted fields)
      function parseLine(line) {
        const cells = []; let cur = '', inQ = false;
        for (let i = 0; i < line.length; i++) {
          const c = line[i];
          if (c === '"') { inQ = !inQ; }
          else if (c === sep && !inQ) { cells.push(cur); cur = ''; }
          else { cur += c; }
        }
        cells.push(cur);
        return cells;
      }
      const header = parseLine(rows[0]);
      let html = '<table><thead><tr>' + header.map(h => `<th>${escHtml(h.trim())}</th>`).join('') + '</tr></thead><tbody>';
      for (let i = 1; i < Math.min(rows.length, 1000); i++) {
        const cols = parseLine(rows[i]);
        html += '<tr>' + cols.map(c => `<td>${escHtml(c.trim())}</td>`).join('') + '</tr>';
      }
      html += '</tbody></table>';
      if (rows.length > 1000) html += `<div style="color:#888;padding:8px;font-size:12px">Showing 1000 of ${rows.length} rows</div>`;
      return html;
    }

    function renderFileTabs() {
      const bar = document.getElementById('editor-tabs');
      bar.innerHTML = openFiles.map((f, i) =>
        `<div class="editor-tab${i === currentFileIdx ? ' active' : ''}${f.dirty ? ' dirty' : ''}" data-idx="${i}">` +
        `<span class="tab-name" title="${escHtml(f.path)}">${escHtml(f.fileName)}</span>` +
        `<span class="tab-close" data-close="${i}">×</span></div>`
      ).join('');
      bar.querySelectorAll('.editor-tab').forEach(el => {
        el.addEventListener('click', (e) => {
          if (e.target.dataset.close !== undefined) return;
          switchToTab(parseInt(el.dataset.idx));
        });
        el.querySelector('.tab-close').addEventListener('click', (e) => {
          e.stopPropagation();
          closeTab(parseInt(e.target.dataset.close));
        });
      });
    }

    function syncSessionFiles() {
      if (!currentSessionId || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({
        type: 'session.setFiles',
        id: currentSessionId,
        paths: openFiles.map(f => f.path),
        activeIdx: currentFileIdx >= 0 ? currentFileIdx : 0,
      }));
    }

    async function restoreOpenFiles(paths, activeIdx) {
      for (const filePath of paths) {
        try {
          const fileName = filePath.split('/').pop();
          if (isImage(fileName)) {
            openFiles.push({ path: filePath, fileName, content: null, dirty: false, mode: 'image' });
            continue;
          }
          const r = await fetch('/api/file?path=' + encodeURIComponent(filePath));
          const { content, error, mtime } = await r.json();
          if (error) continue;
          let defaultMode;
          if (isNotebook(fileName)) defaultMode = 'notebook';
          else if (isCsv(fileName)) defaultMode = 'csv';
          else if (isMarkdown(fileName) || isHtml(fileName)) defaultMode = 'preview';
          else defaultMode = 'code';
          openFiles.push({ path: filePath, fileName, content, dirty: false, mode: defaultMode, mtime: mtime || 0 });
        } catch (e) { /* skip missing files */ }
      }
      if (openFiles.length > 0) {
        currentFileIdx = Math.min(activeIdx, openFiles.length - 1);
        showTabContent(currentFileIdx);
        document.querySelectorAll('.fb-item[data-path]').forEach(el => {
          el.classList.toggle('active', el.dataset.path === fbActiveFile);
        });
      }
      renderFileTabs();
    }

    function saveCurrentTabState() {
      if (currentFileIdx < 0 || currentFileIdx >= openFiles.length) return;
      const tab = openFiles[currentFileIdx];
      if (tab.mode !== 'image' && tab.mode !== 'notebook' && tab.mode !== 'csv') {
        tab.content = document.getElementById('editor-textarea').value;
      }
      tab.dirty = editorDirty;
      tab.mode = editorMode;
    }

    function switchToTab(idx) {
      if (idx === currentFileIdx) return;
      saveCurrentTabState();
      currentFileIdx = idx;
      showTabContent(idx);
      renderFileTabs();
      const filePath = openFiles[idx].path;
      document.querySelectorAll('.fb-item.active').forEach(e => e.classList.remove('active'));
      document.querySelectorAll('.fb-item[data-path]').forEach(el => {
        if (el.dataset.path === filePath) el.classList.add('active');
      });
      fbActiveFile = filePath;
      syncSessionFiles();
    }

    function closeTab(idx) {
      const tab = openFiles[idx];
      if (tab.dirty && !confirm('Discard unsaved changes in ' + tab.fileName + '?')) return;
      openFiles.splice(idx, 1);
      if (openFiles.length === 0) {
        currentFileIdx = -1;
        hideAllViews();
        document.getElementById('editor-placeholder').style.display = 'flex';
        document.getElementById('editor-filename').textContent = 'No file open';
        document.getElementById('editor-save').style.display = 'none';
        document.getElementById('editor-close').style.display = 'none';
        document.getElementById('editor-modes').style.display = 'none';
        document.querySelectorAll('.fb-item.active').forEach(e => e.classList.remove('active'));
        fbActiveFile = null;
        editorDirty = false;
        syncSessionFiles();
        renderFileTabs();
      } else {
        const newIdx = Math.min(idx, openFiles.length - 1);
        currentFileIdx = newIdx;
        showTabContent(newIdx);
        renderFileTabs();
        document.querySelectorAll('.fb-item.active').forEach(e => e.classList.remove('active'));
        document.querySelectorAll('.fb-item[data-path]').forEach(el => {
          if (el.dataset.path === openFiles[newIdx].path) el.classList.add('active');
        });
        fbActiveFile = openFiles[newIdx].path;
        syncSessionFiles();
      }
      setTimeout(() => fitAndScroll(), 60);
    }

    function showTabContent(idx) {
      const tab = openFiles[idx];
      document.getElementById('editor-placeholder').style.display = 'none';
      editorDirty = tab.dirty;
      editorMode = tab.mode;
      editorLang = extToLang(tab.fileName);
      fbActiveFile = tab.path;
      document.getElementById('editor-filename').textContent = tab.fileName;
      document.getElementById('editor-filename').title = tab.path;
      document.getElementById('editor-close').style.display = '';
      markSaved(!tab.dirty);
      const ta = document.getElementById('editor-textarea');
      const modes = document.getElementById('editor-modes');
      const previewBtn = document.getElementById('btn-mode-preview');
      if (isImage(tab.fileName)) {
        hideAllViews();
        document.getElementById('editor-image').innerHTML = `<img src="/api/file/raw?path=${encodeURIComponent(tab.path)}" alt="${escHtml(tab.fileName)}">`;
        document.getElementById('editor-image').style.display = 'block';
        document.getElementById('editor-save').style.display = 'none';
        modes.style.display = 'none';
        setTimeout(() => fitAndScroll(), 60);
        return;
      }
      ta.value = tab.content || '';
      document.getElementById('editor-save').style.display = '';
      modes.style.display = 'flex';
      if (isNotebook(tab.fileName)) {
        previewBtn.style.display = 'none';
        document.getElementById('editor-notebook').innerHTML = renderNotebook(tab.content);
        showView('notebook');
        document.getElementById('editor-save').style.display = 'none';
      } else if (isCsv(tab.fileName)) {
        previewBtn.style.display = 'none';
        document.getElementById('editor-csv').innerHTML = renderCsv(tab.content, tab.fileName);
        hideAllViews();
        document.getElementById('editor-csv').style.display = 'block';
        editorMode = 'csv';
        document.querySelectorAll('.editor-modes button').forEach(b => b.classList.remove('active'));
      } else if (tab.mode === 'edit') {
        previewBtn.style.display = (isMarkdown(tab.fileName) || isHtml(tab.fileName)) ? '' : 'none';
        showView('edit');
      } else if (tab.mode === 'preview' && (isMarkdown(tab.fileName) || isHtml(tab.fileName))) {
        previewBtn.style.display = '';
        showView('preview');
      } else {
        previewBtn.style.display = (isMarkdown(tab.fileName) || isHtml(tab.fileName)) ? '' : 'none';
        showView('code');
      }
      setTimeout(() => fitAndScroll(), 60);
    }

    function openFile(filePath, itemEl) {
      // Switch to existing tab if already open
      const existingIdx = openFiles.findIndex(f => f.path === filePath);
      if (existingIdx !== -1) {
        switchToTab(existingIdx);
        document.querySelectorAll('.fb-item.active').forEach(e => e.classList.remove('active'));
        if (itemEl) itemEl.classList.add('active');
        return;
      }
      saveCurrentTabState();
      const fileName = filePath.split('/').pop();
      // Image files
      if (isImage(fileName)) {
        const tab = { path: filePath, fileName, content: null, dirty: false, mode: 'image' };
        openFiles.push(tab);
        currentFileIdx = openFiles.length - 1;
        renderFileTabs();
        showTabContent(currentFileIdx);
        document.querySelectorAll('.fb-item.active').forEach(e => e.classList.remove('active'));
        if (itemEl) itemEl.classList.add('active');
        fbActiveFile = filePath;
        syncSessionFiles();
        return;
      }
      fetch('/api/file?path=' + encodeURIComponent(filePath))
        .then(r => r.json())
        .then(({ content, error, mtime }) => {
          if (error) { alert('Cannot open: ' + error); return; }
          let defaultMode;
          if (isNotebook(fileName)) defaultMode = 'notebook';
          else if (isCsv(fileName)) defaultMode = 'csv';
          else if (isMarkdown(fileName) || isHtml(fileName)) defaultMode = 'preview';
          else defaultMode = 'code';
          const tab = { path: filePath, fileName, content, dirty: false, mode: defaultMode, mtime: mtime || 0 };
          openFiles.push(tab);
          currentFileIdx = openFiles.length - 1;
          renderFileTabs();
          showTabContent(currentFileIdx);
          document.querySelectorAll('.fb-item.active').forEach(e => e.classList.remove('active'));
          if (itemEl) itemEl.classList.add('active');
          fbActiveFile = filePath;
          syncSessionFiles();
        })
        .catch(() => alert('Failed to load file'));
    }

    // ── File watch: poll mtime and auto-reload changed non-dirty files ──────────
    setInterval(async () => {
      for (let i = 0; i < openFiles.length; i++) {
        const tab = openFiles[i];
        if (tab.dirty || !tab.mtime) continue;
        try {
          const { mtime } = await fetch('/api/file-stat?path=' + encodeURIComponent(tab.path)).then(r => r.json());
          if (mtime && mtime > tab.mtime) {
            const { content, mtime: newMtime } = await fetch('/api/file?path=' + encodeURIComponent(tab.path)).then(r => r.json());
            tab.content = content;
            tab.mtime = newMtime || mtime;
            if (i === currentFileIdx) {
              document.getElementById('editor-textarea').value = content;
              showTabContent(i);
            }
          }
        } catch { /* ignore network errors */ }
      }
    }, 3000);

    function markSaved(saved) {
      const btn = document.getElementById('editor-save');
      btn.textContent = saved ? 'Saved' : 'Save';
      btn.classList.toggle('saved', saved);
    }

    document.getElementById('editor-textarea').addEventListener('input', () => {
      if (!editorDirty) {
        editorDirty = true;
        markSaved(false);
        if (currentFileIdx >= 0) { openFiles[currentFileIdx].dirty = true; renderFileTabs(); }
      }
    });

    document.getElementById('editor-textarea').addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const ta = e.target, s = ta.selectionStart, end = ta.selectionEnd;
        ta.value = ta.value.substring(0, s) + '  ' + ta.value.substring(end);
        ta.selectionStart = ta.selectionEnd = s + 2;
        editorDirty = true; markSaved(false);
        if (currentFileIdx >= 0) { openFiles[currentFileIdx].dirty = true; renderFileTabs(); }
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveFile(); }
    });

    document.getElementById('editor-save').addEventListener('click', saveFile);

    function saveFile() {
      if (!fbActiveFile) return;
      fetch('/api/file', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: fbActiveFile, content: document.getElementById('editor-textarea').value }),
      }).then(r => r.json()).then(({ ok, error }) => {
        if (ok) {
          editorDirty = false; markSaved(true);
          if (currentFileIdx >= 0) { openFiles[currentFileIdx].dirty = false; renderFileTabs(); }
        }
        else alert('Save failed: ' + error);
      }).catch(() => alert('Save request failed'));
    }

    document.getElementById('editor-close').addEventListener('click', () => {
      if (currentFileIdx >= 0) closeTab(currentFileIdx);
    });

    document.getElementById('fb-up').addEventListener('click', () => {
      if (!fbCurrentPath) return;
      const parent = fbCurrentPath.split('/').slice(0, -1).join('/');
      if (parent && parent.length >= 1) fbLoad(parent);
    });

    // ⇄ switch button opens dir picker in browse mode for file browser
    document.getElementById('fb-switch').addEventListener('click', () => {
      openDirPicker({
        browseMode: true,
        onSelect: (fullPath) => fbLoad(fullPath)
      });
    });

    // Load file browser to session's project dir (always updates on session switch)
    function maybeFbLoad(dir) {
      if (!window.matchMedia('(min-width: 900px)').matches) return;
      if (!dir) return;
      fetch('/api/dirs')
        .then(r => r.json())
        .then(({ base }) => { if (base) fbLoad(base + '/' + dir); })
        .catch(() => {});
    }

    // ── Drag-to-resize panels ─────────────────────────────────────────────────
    function makeDraggable(handleId, leftPanel, rightPanel) {
      const handle = document.getElementById(handleId);
      if (!handle) return;
      let dragging = false;
      let startX, startLeft, startRight;

      handle.addEventListener('mousedown', (e) => {
        dragging = true;
        startX = e.clientX;
        startLeft  = leftPanel.getBoundingClientRect().width;
        startRight = rightPanel.getBoundingClientRect().width;
        handle.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
      });

      document.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const dx = e.clientX - startX;
        const newLeft  = Math.max(120, startLeft + dx);
        const newRight = Math.max(120, startRight - dx);
        leftPanel.style.width  = newLeft  + 'px';
        rightPanel.style.width = newRight + 'px';
        fitAndScroll();
      });

      document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        handle.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        fitAndScroll();
      });
    }

    makeDraggable('drag-1', document.getElementById('file-browser'),  document.getElementById('editor-panel'));
    makeDraggable('drag-2', document.getElementById('editor-panel'),   document.getElementById('terminal-column'));
  </script>
</body>
</html>
